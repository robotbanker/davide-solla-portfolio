<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Davide Solla Studio Manager</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="admin.css?v=9">
  </head>
  <body class="admin-body">
    <main class="admin-root">
      <section class="login-panel" data-login-panel>
        <form class="login-form" data-login-form>
          <p class="admin-kicker">Portfolio admin</p>
          <h1>Davide Solla</h1>
          <input name="username" type="text" autocomplete="username" value="admin" hidden>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Enter admin</button>
          <p class="admin-status" data-login-status aria-live="polite"></p>
        </form>
      </section>

      <section class="admin-shell" data-admin-shell hidden>
        <header class="admin-topbar">
          <div>
            <p class="admin-kicker">Portfolio admin</p>
            <h1>Studio manager</h1>
          </div>
          <div class="admin-actions">
            <a href="index.html#work" target="_blank" rel="noreferrer">Preview site</a>
            <button type="button" data-save-site>Save changes</button>
            <button class="secondary" type="button" data-logout>Log out</button>
          </div>
        </header>

        <nav class="admin-tabs" role="tablist" aria-label="Admin sections">
          <button id="admin-tab-design" class="admin-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="admin-panel-design" data-admin-tab="design">Overall design</button>
          <button id="admin-tab-gallery" class="admin-tab" type="button" role="tab" aria-selected="false" aria-controls="admin-panel-gallery" data-admin-tab="gallery">Gallery builder</button>
          <button id="admin-tab-clients" class="admin-tab" type="button" role="tab" aria-selected="false" aria-controls="admin-panel-clients" data-admin-tab="clients">Client management</button>
          <button id="admin-tab-newsletter" class="admin-tab" type="button" role="tab" aria-selected="false" aria-controls="admin-panel-newsletter" data-admin-tab="newsletter">Newsletter</button>
        </nav>

        <p class="admin-status" data-admin-status aria-live="polite"></p>

        <section id="admin-panel-design" class="admin-panel" role="tabpanel" aria-labelledby="admin-tab-design" data-admin-panel="design">
          <div class="panel-head">
            <div>
              <p class="admin-kicker">Overall design</p>
              <h2>Site presentation</h2>
            </div>
          </div>
          <details class="settings-block" open>
            <summary>Site text</summary>
            <div class="settings-grid" data-section-editor></div>
          </details>
        </section>

        <section id="admin-panel-gallery" class="admin-panel" role="tabpanel" aria-labelledby="admin-tab-gallery" data-admin-panel="gallery" hidden>
          <div class="admin-layout">
            <aside class="album-sidebar">
              <div class="sidebar-head">
                <h2>Albums</h2>
                <button type="button" data-create-album>New</button>
              </div>
              <form class="new-album-form" data-create-album-form hidden>
                <label>
                  <span>New album title</span>
                  <input name="title" type="text" autocomplete="off" required>
                </label>
                <div class="row-actions">
                  <button type="submit">Create</button>
                  <button class="secondary" type="button" data-cancel-create-album>Cancel</button>
                </div>
              </form>
              <div class="album-list" data-album-list></div>
            </aside>

            <section class="editor-surface">
              <div class="album-editor" data-album-editor></div>
            </section>
          </div>
        </section>

        <section id="admin-panel-clients" class="admin-panel" role="tabpanel" aria-labelledby="admin-tab-clients" data-admin-panel="clients" hidden>
          <div class="panel-head">
            <div>
              <p class="admin-kicker">Client management</p>
              <h2>Private galleries</h2>
            </div>
          </div>
          <div class="settings-block">
            <div class="client-editor" data-client-editor></div>
          </div>
        </section>

        <section id="admin-panel-newsletter" class="admin-panel" role="tabpanel" aria-labelledby="admin-tab-newsletter" data-admin-panel="newsletter" hidden>
          <div class="panel-head">
            <div>
              <p class="admin-kicker">Newsletter backend</p>
              <h2>Monthly issues</h2>
            </div>
            <div class="newsletter-picker">
              <label>
                <span>Newsletter</span>
                <select data-newsletter-issue-select></select>
              </label>
              <button class="secondary" type="button" data-newsletter-load-issue>Load</button>
              <a class="button-link secondary" data-newsletter-preview-link href="newsletter-preview.html" target="_blank" rel="noreferrer">Preview</a>
            </div>
          </div>

          <div class="newsletter-workspace">
            <aside class="newsletter-section-rail" aria-label="Newsletter sections">
              <button type="button" data-newsletter-section-tab="overview" aria-pressed="true">Overview</button>
              <button type="button" data-newsletter-section-tab="art" aria-pressed="false">01 Art</button>
              <button type="button" data-newsletter-section-tab="fashion" aria-pressed="false">02 Fashion</button>
              <button type="button" data-newsletter-section-tab="field" aria-pressed="false">03 On the Field</button>
              <button type="button" data-newsletter-section-tab="rights" aria-pressed="false">Image rights</button>
              <button type="button" data-newsletter-section-tab="footer" aria-pressed="false">Footer</button>
              <button type="button" data-newsletter-section-tab="json" aria-pressed="false">Full JSON</button>
            </aside>

            <section class="newsletter-editor-panel">
              <div class="newsletter-editor-actions">
                <p class="admin-status" data-newsletter-status aria-live="polite">Loading newsletters...</p>
                <div>
                  <button type="button" data-newsletter-save-section>Save section</button>
                  <button type="button" data-newsletter-save-all>Save all</button>
                  <button class="secondary" type="button" data-newsletter-build-email>Build email</button>
                  <button class="secondary" type="button" data-newsletter-dry-run>Dry Run</button>
                  <button class="danger" type="button" data-newsletter-send-email>Send issue now</button>
                </div>
              </div>

              <form data-newsletter-editor-form>
                <div data-newsletter-editor-root></div>
              </form>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script src="admin.js?v=10"></script>
    <script src="newsletter-admin.js?v=2"></script>
  </body>
</html>
